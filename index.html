<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ElephantPaperSOP</title><style>:root{--bg:#f5f3ef;--card:#fffdf8;--ink:#1f2937;--muted:#6b7280;--accent:#0f766e;--line:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 10%,#d1fae5 0%,transparent 35%),radial-gradient(circle at 90% 20%,#cffafe 0%,transparent 30%),var(--bg)}.wrap{max-width:1100px;margin:0 auto;padding:24px}.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}.row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}input,select{padding:10px;border:1px solid #d1d5db;border-radius:10px}.chip{display:inline-block;padding:4px 8px;background:#ccfbf1;color:#115e59;border-radius:999px;font-size:12px;margin-right:6px}.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px}.meta{font-size:12px;color:var(--muted)}a{color:var(--accent);text-decoration:none}@media(max-width:900px){.row,.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>ElephantPaperSOP</h1><div class="meta">10篇测试版 | 论文写作经验库</div><div class="panel"><div class="row"><input id="q" placeholder="搜索标题/主题/任务类型"><select id="task"><option value="">全部任务类型</option></select><select id="style"><option value="">全部写作风格</option></select></div><div id="stats" style="margin-top:8px"></div></div><div class="grid"><div class="panel"><h3>论文分类与套路</h3><div id="papers"></div></div><div class="panel"><h3>模板库</h3><div id="templates"></div><h3>SOP</h3><div id="sops"></div></div></div></div><script>async function main(){const [a,t,s]=await Promise.all([fetch('./data/analysis/latest.json').then(r=>r.json()),fetch('./data/kb/templates.json').then(r=>r.json()),fetch('./data/kb/sop.json').then(r=>r.json())]);const papers=a.papers;const task=document.getElementById('task');const style=document.getElementById('style');[...new Set(papers.map(x=>x.task_type))].sort().forEach(v=>task.add(new Option(v,v)));[...new Set(papers.map(x=>x.writing_style))].sort().forEach(v=>style.add(new Option(v,v)));document.getElementById('stats').innerHTML=[`<span class="chip">批次 ${a.batch_id}</span>`,`<span class="chip">论文 ${a.batch_size}</span>`,`<span class="chip">全文链接 ${a.fulltext_summary.link_collected}</span>`,`<span class="chip">已解析 ${a.fulltext_summary.text_extracted}</span>`,`<span class="chip">失败 ${a.fulltext_summary.parse_failed}</span>`].join('');const render=()=>{const q=document.getElementById('q').value.toLowerCase().trim();const tv=task.value;const sv=style.value;const f=papers.filter(p=>(!q||[p.title,p.theme,p.task_type,p.method_paradigm].join(' ').toLowerCase().includes(q))&&(!tv||p.task_type===tv)&&(!sv||p.writing_style===sv));document.getElementById('papers').innerHTML=f.map(p=>`<div class="card"><b>${p.title}</b><div class="meta">${p.theme} · ${p.task_type} · ${p.writing_style}</div><div class="meta">Method: ${p.method_paradigm}</div><div class="meta">Intro: ${p.section_playbook.introduction}</div><div class="meta">Method写作: ${p.section_playbook.method}</div><div class="meta">Experiment: ${p.section_playbook.experiment}</div><div><a href="${p.url}" target="_blank">OpenReview</a> · <a href="${p.pdf}" target="_blank">PDF</a></div></div>`).join('')};document.getElementById('q').addEventListener('input',render);task.addEventListener('change',render);style.addEventListener('change',render);render();document.getElementById('templates').innerHTML=t.templates.map(x=>`<div class="card"><div class="meta">${x.section} · ${x.level}</div>${x.template}</div>`).join('');document.getElementById('sops').innerHTML=s.sop_by_type.map(x=>`<div class="card"><b>${x.paper_type}</b><div class="meta">Intro: ${x.introduction_sop.join('；')}</div><div class="meta">Method: ${x.method_sop.join('；')}</div><div class="meta">Experiment: ${x.experiment_sop.join('；')}</div></div>`).join('')}main();</script></body></html>
