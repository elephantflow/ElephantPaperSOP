<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElephantPaperSOP - Introduction Lab</title>
  <style>:root{--bg:#f2f6f4;--surface:#fff;--ink:#102a2a;--muted:#54706f;--line:#d7e3e1;--brand:#0d9488;--brand-soft:#ccfbf1;--accent:#155e75}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif;background:radial-gradient(circle at 8% 8%,#dcfce7 0,transparent 30%),radial-gradient(circle at 92% 12%,#cffafe 0,transparent 28%),linear-gradient(180deg,#f8fbfa 0%,#eef4f3 100%)}.container{max-width:1380px;margin:0 auto;padding:24px 20px 34px}.hero h1{margin:0;font-size:34px;letter-spacing:.2px}.hero p{margin:8px 0 14px;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}.chip{background:var(--brand-soft);color:#0f766e;border-radius:999px;padding:6px 10px;font-size:12px}.toolbar{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:8px;margin-bottom:12px}input,select{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;width:100%;color:var(--ink)}.layout{display:grid;grid-template-columns:340px 1fr 360px;gap:12px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:0 8px 28px rgba(16,42,42,.05);min-height:300px}.panel h2{margin:4px 0 10px;font-size:17px}.paper-item{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;transition:.15s ease;background:#fff}.paper-item:hover{border-color:#98c9c5;transform:translateY(-1px)}.paper-item.active{border-color:var(--brand);background:#f0fdfa}.paper-item .t{font-size:13px;font-weight:600;line-height:1.35}.paper-item .m{color:var(--muted);font-size:12px;margin-top:5px}.title{font-size:20px;line-height:1.35;margin:0 0 8px}.meta{color:var(--muted);font-size:13px;margin-bottom:8px}.tagline{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}.tag{font-size:12px;border:1px solid #b7cecb;color:#155e75;background:#ecfeff;border-radius:999px;padding:3px 8px}.sec{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px}.sec h3{margin:0 0 8px;font-size:15px}.q{border-left:3px solid #99f6e4;margin:7px 0;padding:5px 8px;background:#f8fffe;font-size:13px;line-height:1.45}.map-row{border:1px solid var(--line);border-radius:8px;padding:7px 8px;margin-bottom:6px;font-size:13px;background:#fff}.map-row b{color:#0f766e}.tpl{border:1px solid var(--line);border-radius:10px;padding:9px;margin-bottom:9px;background:#fff}.tpl h4{margin:0 0 4px;font-size:14px}.tpl .sub{color:var(--muted);font-size:12px;margin-bottom:6px}.mini{font-size:12px;line-height:1.4;color:#224}.list{margin:6px 0 0 16px;padding:0;font-size:12px}.list li{margin:3px 0}a{color:var(--brand);text-decoration:none}@media (max-width:1180px){.layout{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}}</style>
</head>
<body><div class="container"><div class="hero"><h1>ElephantPaperSOP · Introduction Lab</h1><p>目标：每篇论文可查看 Introduction 摘抄句、模板映射、组织架构对应；同时沉淀跨论文可复用模板。</p></div><div class="chips" id="topStats"></div><div class="toolbar"><input id="q" placeholder="搜索论文标题、任务类型、模板家族" /><select id="family"><option value="">全部模板家族</option></select><select id="status"><option value="">全部状态</option><option value="ready">可查看摘抄</option><option value="pending">待补抓</option></select></div><div class="layout"><section class="panel"><h2>论文列表（10）</h2><div id="paperList"></div></section><section class="panel"><h2>论文详情</h2><div id="paperDetail"></div></section><section class="panel"><h2>Introduction 模板库</h2><div id="templateList"></div></section></div></div><script>async function loadData(){const[templatesData,papersData]=await Promise.all([fetch('./data/intro/intro-templates-v2.json').then(r=>r.json()),fetch('./data/intro/papers-intro-batch-0001.json').then(r=>r.json())]);return{templatesData,papersData}}function byId(arr){const m={};arr.forEach(x=>{m[x.id]=x});return m}function renderTemplatePanel(templates){const el=document.getElementById('templateList');el.innerHTML=templates.map(t=>`<div class="tpl"><h4>${t.name}</h4><div class="sub">适用：${t.best_for.join(' / ')}</div><div class="mini"><b>Abstract 结构（推荐 4 段）</b></div><ol class="list">${t.abstract_blueprint.map(p=>`<li>P${p.p}：${p.goal}</li>`).join('')}</ol><div class="mini"><b>Introduction 结构（推荐 5 段）</b></div><ol class="list">${t.introduction_blueprint.map(p=>`<li>P${p.p}：${p.goal}</li>`).join('')}</ol><div class="mini"><b>可复用句式</b></div><ul class="list">${t.reusable_sentence_stems.map(s=>`<li>${s}</li>`).join('')}</ul></div>`).join('')}function renderDetail(paper,tpl){const d=document.getElementById('paperDetail');const hasQuotes=paper.intro_excerpts&&paper.intro_excerpts.length>0;d.innerHTML=`<h3 class="title">${paper.title}</h3><div class="meta">ID: ${paper.id}</div><div class="tagline"><span class="tag">模板家族：${tpl?tpl.name:paper.template_family_id}</span><span class="tag">状态：${hasQuotes?'ready':'pending'}</span></div><div class="meta"><a href="${paper.pdf}" target="_blank">查看原文 PDF</a></div><div class="sec"><h3>1) Introduction 优秀摘抄句</h3>${hasQuotes?paper.intro_excerpts.map(q=>`<div class="q">${q}</div>`).join(''):'<div class="q">本轮未成功提取到 Introduction 句子，已标记待重试。</div>'}</div><div class="sec"><h3>2) 该论文如何映射到模板</h3>${paper.structure_mapping.map(m=>`<div class="map-row"><b>${m.step}</b>：${m.evidence}</div>`).join('')}</div><div class="sec"><h3>3) 组织架构与模板对应关系</h3>${tpl?tpl.introduction_blueprint.map(p=>`<div class="map-row"><b>P${p.p} ${p.goal}</b><br/>可套用：${p.pattern}</div>`).join(''):'<div class="map-row">暂无模板详情</div>'}</div>`}function initApp({templatesData,papersData}){const templates=templatesData.template_families;const papers=papersData.papers;const tMap=byId(templates);const statsEl=document.getElementById('topStats');const readyCount=papers.filter(p=>p.intro_excerpts&&p.intro_excerpts.length).length;statsEl.innerHTML=[`批次：${papersData.batch_id}`,`论文总数：${papers.length}`,`可查看摘抄：${readyCount}`,`待补抓：${papers.length-readyCount}`,`模板家族：${templates.length}`].map(s=>`<span class="chip">${s}</span>`).join('');const familySel=document.getElementById('family');templates.forEach(t=>familySel.add(new Option(t.name,t.id)));const listEl=document.getElementById('paperList');let activeId=papers[0]?.id;function filtered(){const q=document.getElementById('q').value.trim().toLowerCase();const family=familySel.value;const status=document.getElementById('status').value;return papers.filter(p=>{const hasQuotes=p.intro_excerpts&&p.intro_excerpts.length>0;const okStatus=!status||(status==='ready'?hasQuotes:!hasQuotes);const okFamily=!family||p.template_family_id===family;const txt=`${p.title} ${p.template_family_id}`.toLowerCase();const okQ=!q||txt.includes(q);return okStatus&&okFamily&&okQ})}function renderList(){const arr=filtered();if(!arr.length){listEl.innerHTML='<div class="map-row">无匹配论文</div>';document.getElementById('paperDetail').innerHTML='';return}if(!arr.find(x=>x.id===activeId))activeId=arr[0].id;listEl.innerHTML=arr.map(p=>{const tpl=tMap[p.template_family_id];const hasQuotes=p.intro_excerpts&&p.intro_excerpts.length>0;return `<div class="paper-item ${p.id===activeId?'active':''}" data-id="${p.id}"><div class="t">${p.title}</div><div class="m">${tpl?tpl.name:p.template_family_id}</div><div class="m">${hasQuotes?'ready':'pending'} · 摘抄 ${p.intro_excerpts.length}</div></div>`}).join('');listEl.querySelectorAll('.paper-item').forEach(node=>{node.addEventListener('click',()=>{activeId=node.dataset.id;renderList()})});const p=arr.find(x=>x.id===activeId);renderDetail(p,tMap[p.template_family_id])}document.getElementById('q').addEventListener('input',renderList);familySel.addEventListener('change',renderList);document.getElementById('status').addEventListener('change',renderList);renderTemplatePanel(templates);renderList()}loadData().then(initApp).catch(err=>{document.body.innerHTML=`<pre style="padding:16px">加载失败: ${err}</pre>`});</script></body></html>
