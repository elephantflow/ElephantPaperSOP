<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Reader · ElephantPaperSOP</title>
  <style>
    :root {
      --bg: #eee8dd;
      --paper: #fffdf8;
      --ink: #1f1a16;
      --muted: #655a4f;
      --line: #d7cab7;
      --accent: #9b3d2b;
      --accent-soft: #f9e7dc;
      --slot: #ffecc5;
      --shadow: 0 14px 42px rgba(30, 20, 10, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 5% -10%, #f8f1df 0, transparent 60%),
        radial-gradient(850px 460px at 98% -15%, #efe0d4 0, transparent 58%),
        linear-gradient(180deg, #f3eee6 0, var(--bg) 80%);
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
      min-height: 100vh;
    }

    .shell { max-width: 1560px; margin: 0 auto; padding: 18px; }
    .toolbar {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      background: rgba(255, 250, 241, 0.92);
      backdrop-filter: blur(4px);
      border-radius: 14px;
      position: sticky;
      top: 10px;
      z-index: 8;
      box-shadow: 0 8px 24px rgba(25, 17, 10, 0.08);
    }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      background: #fffdf8;
      color: var(--ink);
      font-size: 14px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    button { cursor: pointer; font-weight: 700; }

    .layout {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .rail {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 251, 244, 0.92);
      padding: 10px;
      max-height: calc(100vh - 90px);
      overflow: auto;
    }
    .metric {
      margin-bottom: 8px;
      border: 1px dashed #d9cab7;
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 12px;
      color: var(--muted);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .tpl-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px;
      margin-bottom: 8px;
      background: #fffcf7;
      cursor: pointer;
      transition: 0.16s ease;
    }
    .tpl-item:hover { transform: translateY(-1px); border-color: #bea98f; }
    .tpl-item.active { border-color: var(--accent); background: var(--accent-soft); }
    .tpl-id {
      font-size: 13px;
      font-weight: 800;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .tpl-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .reader {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #fffefb, var(--paper));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .paper {
      max-width: 980px;
      margin: 0 auto;
      padding: 34px 42px 42px;
      position: relative;
    }
    .paper::before {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      top: 0;
      height: 4px;
      border-top: 1px solid #e8dccb;
    }

    .mast {
      margin-bottom: 14px;
      border-bottom: 1px solid #e6d9c7;
      padding-bottom: 12px;
    }
    .mast h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0.2px;
      font-weight: 600;
    }
    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      line-height: 1.55;
    }

    .jump {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 14px 0 18px;
    }
    .jump button {
      width: auto;
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff;
      font-size: 12px;
    }
    .jump button.active {
      background: var(--accent-soft);
      border-color: #d8a688;
      color: #7e2d1f;
    }

    .sec { margin: 18px 0 24px; }
    .sec h2 {
      margin: 0 0 8px;
      font-size: 23px;
      font-weight: 600;
      color: #2a221d;
    }
    .lead {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .paragraph {
      margin: 0 0 12px;
      padding: 0;
      font-size: 19px;
      line-height: 1.9;
      text-align: justify;
      text-justify: inter-ideograph;
    }
    .paragraph .n {
      font-size: 12px;
      color: var(--muted);
      vertical-align: super;
      margin-right: 5px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .slot {
      background: var(--slot);
      border: 1px solid #e7c17d;
      border-radius: 6px;
      padding: 1px 5px;
      font-size: 0.92em;
      color: #734200;
      white-space: nowrap;
    }

    .aside {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px dashed #decfb9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffdf9;
      padding: 10px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .kv {
      margin: 0 0 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
      white-space: pre-wrap;
    }
    .mono {
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      color: #3b4d52;
      font-size: 11px;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    @media (max-width: 1180px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .layout { grid-template-columns: 1fr; }
      .rail { max-height: unset; }
      .paper { padding: 22px 16px 24px; }
      .aside { grid-template-columns: 1fr; }
      .paragraph { font-size: 17px; line-height: 1.8; }
      .mast h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="toolbar">
      <input id="q" placeholder="搜索模板 ID / 名称 / 领域 / 策略" />
      <select id="domain"><option value="">全部领域</option></select>
      <select id="strategy"><option value="">全部策略</option></select>
      <select id="variant"><option value="">全部变体</option></select>
      <button id="homeBtn" type="button">返回主页</button>
    </section>

    <section class="layout">
      <aside class="rail">
        <div id="metrics"></div>
        <div id="list"></div>
      </aside>

      <main class="reader">
        <article id="paper" class="paper"></article>
      </main>
    </section>
  </div>

  <script>
    const SECTIONS = {
      abstract_template: "Abstract",
      full_intro_template: "Introduction",
      method_template: "Method",
      experiments_template: "Experiments",
      conclusion_template: "Conclusion"
    };

    function esc(v){
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function slotify(s){
      return esc(s).replace(/&lt;([^&]+)&gt;/g, '<span class="slot">&lt;$1&gt;</span>');
    }

    function asLines(v){
      if(Array.isArray(v)) return v.map(String).filter(Boolean);
      if(typeof v === "string" && v.trim()) return [v.trim()];
      return [];
    }

    async function loadAll(){
      const idxResp = await fetch("./data/v1/index.json", { cache:"no-store" });
      if(!idxResp.ok) throw new Error("index.json 加载失败");
      const idx = await idxResp.json();
      const templates = [];
      for(const tid of idx.templates || []){
        const path = `./${idx.paths.templates_intro_dir}/${tid}.json`;
        const r = await fetch(path, { cache:"no-store" });
        if(!r.ok) continue;
        const t = await r.json();
        t.__path = path;
        templates.push(t);
      }
      return { idx, templates };
    }

    function fillSelect(id, vals){
      const sel = document.getElementById(id);
      vals.forEach(v => sel.add(new Option(v, v)));
    }

    function filterTemplates(state){
      const q = document.getElementById("q").value.trim().toLowerCase();
      const d = document.getElementById("domain").value;
      const s = document.getElementById("strategy").value;
      const v = document.getElementById("variant").value;

      return state.templates.filter(t => {
        const hay = `${t.id||""} ${t.name||""} ${t.domain||""} ${t.narrative_strategy||""}`.toLowerCase();
        return (!q || hay.includes(q))
          && (!d || t.domain === d)
          && (!s || t.narrative_strategy === s)
          && (!v || t.variant === v);
      });
    }

    function renderMetrics(state){
      const domains = new Set(state.templates.map(t=>t.domain).filter(Boolean));
      const strategies = new Set(state.templates.map(t=>t.narrative_strategy).filter(Boolean));
      document.getElementById("metrics").innerHTML = `
        <div class="metric">schema: ${esc(state.idx.schema_version)}</div>
        <div class="metric">templates: ${state.templates.length}</div>
        <div class="metric">domains: ${domains.size} · strategies: ${strategies.size}</div>
        <div class="metric">updated: ${esc(String(state.idx.updated_at || "N/A").slice(0, 10))}</div>
      `;
    }

    function renderList(state){
      const arr = filterTemplates(state);
      const list = document.getElementById("list");
      if(!arr.length){
        list.innerHTML = '<div class="empty">没有匹配模板</div>';
        document.getElementById("paper").innerHTML = '<div class="empty">请调整筛选条件。</div>';
        return;
      }
      if(!arr.some(x => x.id === state.activeId)) state.activeId = arr[0].id;

      list.innerHTML = arr.map(t => `
        <div class="tpl-item ${t.id===state.activeId?"active":""}" data-id="${esc(t.id)}">
          <div class="tpl-id">${esc(t.id)} · ${esc(t.name || "Unnamed")}</div>
          <div class="tpl-meta">domain=${esc(t.domain || "N/A")}<br/>strategy=${esc(t.narrative_strategy || "N/A")} · variant=${esc(t.variant || "N/A")}</div>
        </div>
      `).join("");

      list.querySelectorAll("[data-id]").forEach(el => {
        el.onclick = () => { state.activeId = el.dataset.id; renderList(state); renderPaper(state); };
      });
    }

    function renderParagraphs(lines){
      if(!lines.length) return '<div class="empty">暂无该章节模板内容</div>';
      return lines.map((line, i) => `<p class="paragraph"><span class="n">${i+1}</span>${slotify(line)}</p>`).join("");
    }

    function renderPaper(state){
      const t = state.templates.find(x => x.id === state.activeId);
      const el = document.getElementById("paper");
      if(!t){ el.innerHTML = '<div class="empty">未找到模板</div>'; return; }

      const tabs = Object.keys(SECTIONS).map(k =>
        `<button class="${state.activeTab===k?"active":""}" data-tab="${k}">${SECTIONS[k]}</button>`
      ).join("");

      const sectionLines = asLines(t[state.activeTab]);
      const cards = (t.paragraph_cards || []).slice(0, 6).map(c => `
        <div class="card">
          <h3>${esc(c.id || "Paragraph")}</h3>
          <p class="kv"><b>purpose</b>: ${esc(c.purpose || "N/A")}</p>
          <p class="kv"><b>must_include</b>: ${(c.must_include || []).map(esc).join("; ") || "N/A"}</p>
          <p class="kv"><b>forbidden</b>: ${(c.forbidden_claims || []).map(esc).join("; ") || "N/A"}</p>
        </div>
      `).join("");

      el.innerHTML = `
        <header class="mast">
          <h1>${esc(t.name || t.id)}</h1>
          <div class="subtitle">
            ${esc(t.id)} · domain ${esc(t.domain || "N/A")} · strategy ${esc(t.narrative_strategy || "N/A")} · variant ${esc(t.variant || "N/A")}<br/>
            best_for: ${esc((t.best_for || []).join(", ") || "N/A")}
          </div>
        </header>

        <nav class="jump">${tabs}</nav>

        <section class="sec">
          <h2>${SECTIONS[state.activeTab]}</h2>
          <p class="lead">以论文阅读排版展示模板正文，便于直接感知段落节奏与论证顺序。</p>
          ${renderParagraphs(sectionLines)}
        </section>

        <section class="aside">
          <div class="card">
            <h3>Reviewer Constraints</h3>
            <p class="kv"><b>falsifiable_claims</b>\n${(t.falsifiable_claims || []).map(esc).join("\n") || "N/A"}</p>
            <p class="kv"><b>limitations_or_failure_cases</b>\n${esc(t.limitations_or_failure_cases || "N/A")}</p>
            <p class="kv"><b>delta_vs_strongest_baseline</b>\n${esc(t.delta_vs_strongest_baseline || "N/A")}</p>
            <p class="kv"><span class="mono">${esc(t.__path)}</span></p>
          </div>
          ${cards || '<div class="card"><h3>Paragraph Cards</h3><p class="kv">N/A</p></div>'}
        </section>
      `;

      el.querySelectorAll("[data-tab]").forEach(btn => {
        btn.onclick = () => { state.activeTab = btn.dataset.tab; renderPaper(state); };
      });
    }

    async function main(){
      try {
        const { idx, templates } = await loadAll();
        const state = {
          idx,
          templates,
          activeId: templates[0]?.id || "",
          activeTab: "full_intro_template"
        };

        fillSelect("domain", [...new Set(templates.map(t=>t.domain).filter(Boolean))].sort());
        fillSelect("strategy", [...new Set(templates.map(t=>t.narrative_strategy).filter(Boolean))].sort());
        fillSelect("variant", [...new Set(templates.map(t=>t.variant).filter(Boolean))].sort());

        renderMetrics(state);
        renderList(state);
        renderPaper(state);

        ["q","domain","strategy","variant"].forEach(id => {
          const node = document.getElementById(id);
          node.addEventListener("input", () => { renderList(state); renderPaper(state); });
          node.addEventListener("change", () => { renderList(state); renderPaper(state); });
        });

        document.getElementById("homeBtn").onclick = () => { window.location.href = "./index.html"; };
      } catch (err) {
        document.getElementById("paper").innerHTML = `<div class="empty">页面加载失败：${esc(String(err))}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
