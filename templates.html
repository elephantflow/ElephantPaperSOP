<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElephantPaperSOP Templates</title>
  <style>
    :root{
      --bg:#f4efe7;
      --ink:#1f1a17;
      --muted:#6a5c4f;
      --line:#d8cabb;
      --card:#fffaf4;
      --accent:#c04f2f;
      --accent-2:#1f6d63;
      --soft:#fbe7d9;
      --slot:#ffe8bf;
      --shadow:0 12px 30px rgba(35,22,13,.08);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 560px at 12% -8%,#fff5d8 0,transparent 56%),
        radial-gradient(780px 480px at 90% 0%,#f6e5d8 0,transparent 60%),
        linear-gradient(180deg,#f9f4ed 0,#f2ece3 72%,#efe7de 100%);
      min-height:100vh;
    }
    .wrap{max-width:1520px;margin:0 auto;padding:24px 20px 28px}
    .hero{
      border:1px solid var(--line);
      border-radius:22px;
      background:linear-gradient(130deg,rgba(255,250,244,.96),rgba(255,243,233,.95));
      box-shadow:var(--shadow);
      padding:24px;
      position:relative;
      overflow:hidden;
      margin-bottom:14px;
    }
    .hero::after{
      content:"";
      position:absolute;
      right:-80px;
      top:-90px;
      width:320px;
      height:320px;
      background:radial-gradient(circle,#ffd6a8 0,rgba(255,214,168,.1) 72%,transparent 100%);
      transform:rotate(8deg);
      pointer-events:none;
    }
    h1{margin:0;font-size:34px;letter-spacing:.2px;font-family:"Georgia","Times New Roman",serif}
    .sub{margin:10px 0 0;color:var(--muted);font-size:16px;line-height:1.65;max-width:980px}
    .topbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      border:1px solid var(--line);border-radius:999px;padding:9px 13px;
      background:#fff;color:var(--ink);text-decoration:none;font-size:13px;font-weight:700
    }
    .btn:hover{border-color:#bba896;background:#fff7ef}
    .metrics{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .metric{padding:7px 10px;border-radius:999px;background:var(--soft);font-size:12px;font-weight:700;color:#7c341f}
    .tools{
      display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:10px;margin:14px 0;
    }
    input,select,button{
      width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);
      font-size:14px;background:#fffaf4;color:var(--ink)
    }
    button{cursor:pointer;background:#fdf6ee;font-weight:700}
    button:hover{background:#f9ecdf}
    .layout{display:grid;grid-template-columns:320px 1fr;gap:12px}
    .panel{border:1px solid var(--line);border-radius:16px;background:var(--card);box-shadow:var(--shadow)}
    .panel h2{margin:0;padding:14px 14px 10px;font-size:18px;border-bottom:1px dashed var(--line)}
    #list{padding:10px;max-height:74vh;overflow:auto}
    .item{padding:10px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px;cursor:pointer;transition:.16s}
    .item:hover{transform:translateY(-1px);border-color:#c5b5a4}
    .item.active{border-color:var(--accent);background:#fff1e7}
    .it{font-size:14px;font-weight:800;line-height:1.4}
    .im{font-size:12px;color:var(--muted);margin-top:5px}
    .content{padding:14px}
    .title{font-family:"Georgia","Times New Roman",serif;font-size:29px;line-height:1.2;margin:0 0 8px}
    .meta{font-size:13px;color:var(--muted);line-height:1.55}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .tab{padding:8px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;cursor:pointer;background:#fff}
    .tab.active{background:#ffe8d6;border-color:#efb997;color:#883418;font-weight:700}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .box{border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}
    .box h3{margin:0 0 8px;font-size:14px}
    .row{font-size:13px;line-height:1.55;margin:0 0 6px}
    .row:last-child{margin-bottom:0}
    .template{margin-top:10px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px}
    .line{margin:8px 0;padding:9px 10px;border-radius:10px;background:#fff9f2;border:1px dashed #dbcab7;font-size:14px;line-height:1.62}
    .slot{background:var(--slot);border:1px solid #f0c47f;border-radius:6px;padding:1px 4px;font-weight:700;color:#7a4b00}
    .muted{font-size:12px;color:var(--muted)}
    .cards{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .pcard{border:1px solid #dbcbb8;border-radius:12px;padding:10px;background:#fffdf9}
    .pcard h4{margin:0 0 6px;font-size:14px}
    .mono{font-family:"SFMono-Regular","Menlo","Consolas",monospace;font-size:12px;color:#344}
    .empty{padding:18px;color:var(--muted)}
    @media (max-width:1180px){
      .tools{grid-template-columns:1fr 1fr}
      .layout{grid-template-columns:1fr}
      #list{max-height:unset}
      .grid,.cards{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>ElephantPaperSOP Template Gallery</h1>
      <p class="sub">面向论文写作模板的专用前端页面。支持按领域与策略筛选，查看 Abstract/Introduction/Method/Experiments 模板正文、段落卡片与审稿约束。</p>
      <div class="topbar">
        <a class="btn" href="./index.html">主工作台</a>
        <a class="btn" href="./reviewer_reports/">Reviewer Reports</a>
      </div>
      <div id="metrics" class="metrics"></div>
    </section>

    <section class="tools">
      <input id="q" type="text" placeholder="搜索模板 ID / 名称 / 领域 / 策略" />
      <select id="domain"><option value="">全部领域</option></select>
      <select id="strategy"><option value="">全部策略</option></select>
      <select id="variant"><option value="">全部变体</option></select>
      <button id="copyBtn" type="button">复制当前模板 JSON 路径</button>
    </section>

    <section class="layout">
      <aside class="panel">
        <h2>模板列表</h2>
        <div id="list"></div>
      </aside>
      <main class="panel">
        <h2>模板详情</h2>
        <div id="detail" class="content"></div>
      </main>
    </section>
  </div>

  <script>
    const TAB_FIELDS = {
      abstract_template: "Abstract",
      full_intro_template: "Introduction",
      method_template: "Method",
      experiments_template: "Experiments",
      conclusion_template: "Conclusion"
    };

    function esc(v){
      return String(v ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/\"/g,"&quot;")
        .replace(/'/g,"&#39;");
    }

    function withSlots(s){
      return esc(s).replace(/&lt;([^&]+)&gt;/g,'<span class="slot">&lt;$1&gt;</span>');
    }

    function normalizeLines(v){
      if(Array.isArray(v)) return v.filter(Boolean).map(String);
      if(typeof v === "string" && v.trim()) return [v.trim()];
      return [];
    }

    async function loadData(){
      const idxRes = await fetch("./data/v1/index.json", {cache:"no-store"});
      if(!idxRes.ok) throw new Error("index.json 加载失败");
      const idx = await idxRes.json();
      const templates = [];
      for(const tid of idx.templates || []){
        const p = `./${idx.paths.templates_intro_dir}/${tid}.json`;
        const r = await fetch(p, {cache:"no-store"});
        if(!r.ok) continue;
        const t = await r.json();
        t.__path = p;
        templates.push(t);
      }
      return { idx, templates };
    }

    function renderMetrics(idx, templates){
      const domainSet = new Set(templates.map(t=>t.domain).filter(Boolean));
      const strategySet = new Set(templates.map(t=>t.narrative_strategy).filter(Boolean));
      const el = document.getElementById("metrics");
      el.innerHTML = [
        `schema ${idx.schema_version}`,
        `模板 ${templates.length}`,
        `领域 ${domainSet.size}`,
        `策略 ${strategySet.size}`,
        `更新时间 ${String(idx.updated_at || "N/A").slice(0,10)}`
      ].map(x=>`<span class="metric">${esc(x)}</span>`).join("");
    }

    function bindFilters(state){
      const domain = document.getElementById("domain");
      const strategy = document.getElementById("strategy");
      const variant = document.getElementById("variant");

      const domains = [...new Set(state.templates.map(t=>t.domain).filter(Boolean))].sort();
      const strategies = [...new Set(state.templates.map(t=>t.narrative_strategy).filter(Boolean))].sort();
      const variants = [...new Set(state.templates.map(t=>t.variant).filter(Boolean))].sort();

      domains.forEach(v=>domain.add(new Option(v,v)));
      strategies.forEach(v=>strategy.add(new Option(v,v)));
      variants.forEach(v=>variant.add(new Option(v,v)));
    }

    function filteredTemplates(state){
      const q = document.getElementById("q").value.trim().toLowerCase();
      const domain = document.getElementById("domain").value;
      const strategy = document.getElementById("strategy").value;
      const variant = document.getElementById("variant").value;
      return state.templates.filter(t=>{
        const hay = `${t.id||""} ${t.name||""} ${t.domain||""} ${t.narrative_strategy||""}`.toLowerCase();
        return (!q || hay.includes(q))
          && (!domain || t.domain===domain)
          && (!strategy || t.narrative_strategy===strategy)
          && (!variant || t.variant===variant);
      });
    }

    function renderList(state){
      const list = document.getElementById("list");
      const arr = filteredTemplates(state);
      if(!arr.length){
        list.innerHTML = '<div class="empty">没有匹配模板</div>';
        document.getElementById("detail").innerHTML = '<div class="empty">请调整筛选条件。</div>';
        return;
      }
      if(!arr.some(t=>t.id===state.activeId)) state.activeId = arr[0].id;
      list.innerHTML = arr.map(t=>`
        <div class="item ${t.id===state.activeId?"active":""}" data-id="${esc(t.id)}">
          <div class="it">${esc(t.id)} · ${esc(t.name || "Unnamed")}</div>
          <div class="im">domain=${esc(t.domain||"N/A")} · strategy=${esc(t.narrative_strategy||"N/A")} · variant=${esc(t.variant||"N/A")}</div>
        </div>`).join("");

      list.querySelectorAll(".item").forEach(el=>{
        el.onclick = ()=>{ state.activeId = el.dataset.id; renderList(state); renderDetail(state); };
      });
    }

    function renderTemplateLines(t, field){
      const lines = normalizeLines(t[field]);
      if(!lines.length) return '<div class="empty">该章节暂无模板内容</div>';
      return lines.map((line, idx)=>`<div class="line"><b>${field.slice(0,1).toUpperCase()}${idx+1}.</b> ${withSlots(line)}</div>`).join("");
    }

    function renderDetail(state){
      const detail = document.getElementById("detail");
      const t = state.templates.find(x=>x.id===state.activeId);
      if(!t){ detail.innerHTML='<div class="empty">未找到模板</div>'; return; }

      const tabs = Object.keys(TAB_FIELDS).map(k=>`<button class="tab ${state.activeTab===k?"active":""}" data-tab="${k}">${TAB_FIELDS[k]}</button>`).join("");
      const cards = (t.paragraph_cards || []).map(c=>`
        <div class="pcard">
          <h4>${esc(c.id || "Card")} · ${esc(c.purpose || "")}</h4>
          <div class="row"><b>template</b>: ${withSlots(c.template || "")}</div>
          <div class="row"><b>must_include</b>: ${esc((c.must_include || []).join("; ") || "N/A")}</div>
          <div class="row"><b>forbidden_claims</b>: ${esc((c.forbidden_claims || []).join("; ") || "N/A")}</div>
          <div class="row"><b>evidence_hook</b>: ${esc(c.evidence_hook || "N/A")}</div>
        </div>
      `).join("");

      detail.innerHTML = `
        <h3 class="title">${esc(t.name || t.id)}</h3>
        <div class="meta">
          <span><b>ID</b>: ${esc(t.id)}</span> ·
          <span><b>domain</b>: ${esc(t.domain || "N/A")}</span> ·
          <span><b>strategy</b>: ${esc(t.narrative_strategy || "N/A")}</span> ·
          <span><b>variant</b>: ${esc(t.variant || "N/A")}</span>
        </div>
        <div class="meta"><b>best_for</b>: ${esc((t.best_for || []).join(", ") || "N/A")}</div>

        <div class="tabs">${tabs}</div>
        <div class="template">${renderTemplateLines(t, state.activeTab)}</div>

        <div class="grid" style="margin-top:12px">
          <div class="box">
            <h3>审稿约束</h3>
            <p class="row"><b>falsifiable_claims</b><br>${esc((t.falsifiable_claims || []).join("\n") || "N/A")}</p>
            <p class="row"><b>limitations_or_failure_cases</b><br>${esc(t.limitations_or_failure_cases || "N/A")}</p>
            <p class="row"><b>delta_vs_strongest_baseline</b><br>${esc(t.delta_vs_strongest_baseline || "N/A")}</p>
          </div>
          <div class="box">
            <h3>结构设置</h3>
            <p class="row"><b>core_blocks</b>: ${esc((t.core_blocks || []).join(" > ") || "N/A")}</p>
            <p class="row"><b>optional_blocks</b>: ${esc((t.optional_blocks || []).join(" > ") || "N/A")}</p>
            <p class="row"><b>reorderable</b>: ${esc(String(t.reorderable))}</p>
            <p class="row"><b>path</b>: <span class="mono">${esc(t.__path)}</span></p>
          </div>
        </div>

        <div class="template" style="margin-top:12px">
          <h3 style="margin:0 0 8px">Paragraph Cards</h3>
          <div class="cards">${cards || '<div class="empty">暂无段落卡片</div>'}</div>
        </div>
      `;

      detail.querySelectorAll("[data-tab]").forEach(el=>{
        el.onclick = ()=>{ state.activeTab = el.dataset.tab; renderDetail(state); };
      });
    }

    async function main(){
      try{
        const { idx, templates } = await loadData();
        const state = { idx, templates, activeId: templates[0]?.id || "", activeTab:"full_intro_template" };

        renderMetrics(idx, templates);
        bindFilters(state);
        renderList(state);
        renderDetail(state);

        ["q","domain","strategy","variant"].forEach(id=>{
          document.getElementById(id).addEventListener("input", ()=>{renderList(state); renderDetail(state);});
          document.getElementById(id).addEventListener("change", ()=>{renderList(state); renderDetail(state);});
        });

        document.getElementById("copyBtn").onclick = async ()=>{
          const t = state.templates.find(x=>x.id===state.activeId);
          if(!t) return;
          const txt = t.__path || "";
          try{ await navigator.clipboard.writeText(txt); }
          catch{ window.prompt("复制路径", txt); }
        };
      }catch(err){
        document.getElementById("detail").innerHTML = `<div class="empty">加载失败: ${esc(String(err))}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
